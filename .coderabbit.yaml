language: "fr"
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/*.lock"
    - "!**/node_modules/**"
  path_instructions:
    - path: "**/*.test.ts"
      instructions: "Vérifie que les mocks sont réalistes, les cas limites couverts, et qu'aucun détail d'implémentation ne transparaît dans les tests."
    - path: "**/*.test.tsx"
      instructions: "Vérifie que les mocks sont réalistes, les cas limites couverts, et qu'aucun détail d'implémentation ne transparaît dans les tests."
    - path: "src/components/**/*.tsx"
      instructions: "Vérifie l'accessibilité (aria, role), la gestion des états de chargement/erreur, et que les props sont bien typées."
    - path: "src/lib/**/*.ts"
      instructions: "Vérifie la gestion des erreurs, les types de retour, et que les fonctions sont pures autant que possible."
chat:
  auto_reply: true
